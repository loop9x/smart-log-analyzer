# Periodically calls the trip-booking service (sync and async) to generate
# realistic OpenTelemetry traces and logs across the booking microservices
- route:
    id: sync-load-generator
    description: Generate sync load
    from:
      uri: timer:syncLoadGenerator
      parameters:
        period: "{{timer.period:5000}}"
        fixedRate: true
      steps:
        - to:
            description: Call trip API
            uri: http://{{service.trip}}/camel/bookTrip
        - log:
            description: Log sync reply
            message: "Trip booking response: ${body}"
            logName: com.example.loadgen.LoadGenerator
- route:
    id: async-load-generator
    description: Generate async load
    from:
      uri: timer:asyncLoadGenerator
      parameters:
        period: "{{timer.async.period:8000}}"
        fixedRate: true
      steps:
        - to:
            description: Call trip API
            uri: http://{{service.trip}}/camel/asyncBookTrip
        - log:
            description: Log async reply
            message: "Async trip booking response: ${body}"
            logName: com.example.loadgen.LoadGenerator
